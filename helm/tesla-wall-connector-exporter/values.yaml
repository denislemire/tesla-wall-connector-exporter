replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/denislemire/tesla-wall-connector-exporter
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

twc:
  # Required: hostname or IP of the Wall Connector on your LAN.
  address: ""
  timeout: 5s

service:
  type: ClusterIP
  port: 9859
  annotations: {}

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# Use hostNetwork when pod CNI cannot reach the charger (common on home LANs).
hostNetwork: false
dnsPolicy: ClusterFirst

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels:
    release: monitoring
  relabelings: []
  metricRelabelings: []

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 15
  timeoutSeconds: 3
